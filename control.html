<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Geno-2 — Control</title>
    <style>
      :root {
        --panel: #1e1a28;
        --line: #3a3248;
        --text: #f3e8d8;
        --soft: #c9bea9;
        --hot: #ef9f68;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font: 14px/1.5 system-ui, -apple-system, "Avenir Next", sans-serif;
        color: var(--text);
        background: linear-gradient(140deg, #130f16, #221c2e);
        min-height: 100vh;
      }
      .wrap { max-width: 560px; margin: 0 auto; padding: 20px; }
      h1 {
        font-size: 16px; letter-spacing: 0.12em; text-transform: uppercase;
        color: #f1cfab; margin: 0 0 4px;
      }
      .sub { color: var(--soft); margin: 0 0 16px; font-size: 12px; }
      .bar, .ctl {
        background: var(--panel); border: 1px solid var(--line);
        border-radius: 8px; padding: 14px 16px; margin-bottom: 12px;
      }
      .code-block {
        display: grid; gap: 4px;
      }
      .code {
        color: #f1cfab; font: 800 34px/1 "SF Mono", Menlo, Consolas, monospace;
        letter-spacing: 0.14em; font-variant-numeric: tabular-nums;
      }
      label { display: block; font-size: 12px; color: var(--soft); margin-bottom: 6px; }
      .row { display: flex; gap: 10px; align-items: center; }
      input[type="text"], input[type="number"], select {
        width: 100%; background: #15121d; color: var(--text);
        border: 1px solid var(--line); border-radius: 6px; padding: 8px 10px; font: inherit;
      }
      input[type="range"] { width: 100%; accent-color: var(--hot); }
      button {
        appearance: none; border: 1px solid rgba(144, 213, 219, 0.5);
        background: linear-gradient(180deg, #26323e, #151e27); color: #e4f3f2;
        font: 600 13px system-ui; padding: 9px 14px; border-radius: 6px; cursor: pointer;
      }
      .val { color: var(--hot); font-variant-numeric: tabular-nums; }
      .dot { width: 10px; height: 10px; border-radius: 50%; background: #b55; display: inline-block; }
      .dot.on { background: #6c6; }
      .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
      .muted { color: var(--soft); font-size: 12px; }
      fieldset { border: 1px solid var(--line); border-radius: 8px; }
      fieldset:disabled { opacity: 0.5; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1>Geno-2 Control</h1>
      <p class="sub">Settings stay off the instrument screen while you perform.</p>

      <div class="bar">
        <div class="row" style="justify-content: space-between;">
          <div class="code-block">
            <span class="muted">Panel code</span>
            <span id="panel-code" class="code">000000</span>
          </div>
          <button id="open">Open Instrument</button>
        </div>
        <div class="row" style="margin-top: 12px; justify-content: space-between;">
          <span><span id="dot" class="dot"></span> <span id="status" class="muted">looking for surface</span></span>
          <button id="start">Start</button>
        </div>
        <p class="muted" style="margin: 10px 0 0;">On the instrument, press <strong>H</strong> and enter this code in the bottom-right control panel area.</p>
      </div>

      <fieldset id="controls" class="ctl" disabled>
        <div>
          <label>Tempo — <span id="bpmv" class="val">92</span> bpm</label>
          <input id="bpm" type="range" min="40" max="240" step="1" value="92" />
        </div>
        <div style="margin-top: 14px;">
          <label>Detune — <span id="detv" class="val">0</span> ¢</label>
          <input id="detune" type="range" min="-200" max="200" step="5" value="0" />
        </div>
        <div class="grid2" style="margin-top: 14px;">
          <div>
            <label>Root</label>
            <select id="root">
              <option value="60">C</option><option value="62" selected>D</option>
              <option value="64">E</option><option value="65">F</option>
              <option value="67">G</option><option value="69">A</option><option value="71">B</option>
            </select>
          </div>
          <div>
            <label>Scale</label>
            <select id="scale">
              <option>Ionian (major)</option><option selected>Dorian</option><option>Phrygian</option>
              <option>Lydian</option><option>Mixolydian</option><option>Aeolian (minor)</option><option>Locrian</option>
              <option>C Major Pentatonic</option><option>19-TET pentatonic</option>
              <option>24-TET pentatonic</option><option>31-TET pentatonic</option>
            </select>
          </div>
        </div>
        <div class="grid2" style="margin-top: 14px;">
          <div>
            <label>Seed</label>
            <div class="row"><input id="seed" type="number" value="42" /><button id="newseq">New</button></div>
          </div>
          <div>
            <label>Master — <span id="volv" class="val">0.46</span></label>
            <input id="volume" type="range" min="0" max="1" step="0.01" value="0.46" />
          </div>
        </div>
        <div class="row" style="margin-top: 14px;">
          <label style="margin: 0;"><input id="paused" type="checkbox" /> Paused</label>
        </div>
      </fieldset>
    </div>

    <script>
      (function () {
        const $ = (id) => document.getElementById(id);
        const channelName = "geno-2-control";
        const channel = "BroadcastChannel" in window ? new BroadcastChannel(channelName) : null;
        const tabId = Math.random().toString(36).slice(2);
        const codeStorageKey = `${channelName}-panel-code`;
        const normalizeCode = (value) => String(value || "").replace(/\D/g, "").slice(0, 6);
        function generateCode() {
          return String(Math.floor(100000 + Math.random() * 900000));
        }
        let pairingCode = generateCode();
        try {
          const stored = normalizeCode(sessionStorage.getItem(codeStorageKey));
          if (stored.length === 6) pairingCode = stored;
          else sessionStorage.setItem(codeStorageKey, pairingCode);
        } catch {}
        $("panel-code").textContent = pairingCode;
        let linked = false;

        function setStatus(isLinked, text) {
          linked = isLinked;
          $("dot").classList.toggle("on", isLinked);
          $("status").textContent = text;
          $("controls").disabled = !isLinked;
        }
        function post(msg) {
          const out = { ...msg, source: "control", code: pairingCode, tabId, nonce: Date.now() };
          if (channel) channel.postMessage(out);
          try {
            localStorage.setItem(`${channelName}-command`, JSON.stringify(out));
          } catch {}
        }
        function send(k, v) {
          post({ t: "set", k, v });
        }
        function applyState(state) {
          if (!state) return;
          if (Number.isFinite(+state.bpm)) {
            $("bpm").value = Math.round(+state.bpm);
            $("bpmv").textContent = $("bpm").value;
          }
          if (Number.isFinite(+state.detune)) {
            $("detune").value = Math.round(+state.detune);
            $("detv").textContent = $("detune").value;
          }
          if (Number.isFinite(+state.root)) $("root").value = String(+state.root);
          if (state.scale) $("scale").value = String(state.scale);
          if (typeof state.paused === "boolean") $("paused").checked = state.paused;
          if (Number.isFinite(+state.volume)) {
            $("volume").value = (+state.volume).toFixed(2);
            $("volv").textContent = $("volume").value;
          }
          setStatus(true, "linked to instrument");
        }
        function handle(msg) {
          if (!msg || msg.source !== "surface") return;
          if (normalizeCode(msg.code) !== pairingCode) return;
          if (msg.t === "pair") {
            setStatus(true, "linked to instrument");
            post({ t: "request_state" });
            return;
          }
          if (msg.t === "state") applyState(msg.state);
        }

        if (channel) channel.onmessage = (ev) => handle(ev.data);
        window.addEventListener("storage", (ev) => {
          if (ev.key !== `${channelName}-state` || !ev.newValue) return;
          try { handle(JSON.parse(ev.newValue)); } catch {}
        });

        $("open").onclick = () => window.open("./", "geno-2-instrument");
        $("start").onclick = () => post({ t: "start" });
        $("bpm").oninput = (e) => { $("bpmv").textContent = e.target.value; send("bpm", +e.target.value); };
        $("detune").oninput = (e) => { $("detv").textContent = e.target.value; send("detune", +e.target.value); };
        $("root").onchange = (e) => send("root", +e.target.value);
        $("scale").onchange = (e) => send("scale", e.target.value);
        $("seed").onchange = (e) => send("seed", +e.target.value);
        $("newseq").onclick = () => { const s = Math.floor(Math.random() * 1e9); $("seed").value = s; send("seed", s); };
        $("volume").oninput = (e) => { $("volv").textContent = e.target.value; send("volume", +e.target.value); };
        $("paused").onchange = (e) => send("paused", e.target.checked);
        post({ t: "request_state" });
        setStatus(false, "enter code on instrument");
        setInterval(() => {
          if (!linked) post({ t: "request_state" });
        }, 800);
      })();
    </script>
  </body>
</html>
