name = "geno-2"
compatibility_date = "2024-08-06"
compatibility_flags = ["nodejs_compat"]
main = "worker.js"

[assets]
directory = "./dist"
binding = "ASSETS"
html_handling = "none"
not_found_handling = "single-page-application"
# Run worker.js before asset serving so its Cache-Control headers apply.
run_worker_first = true

[vars]
ENVIRONMENT = "production"

[[routes]]
pattern = "geno-2.tre.systems/*"
zone_name = "tre.systems"

# Performance relay: one Room Durable Object per room id holds the broadcast
# state and fans parameter changes out to connected display clients.
[[durable_objects.bindings]]
name = "ROOM"
class_name = "Room"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["Room"]

[dev]
port = 8787
local_protocol = "http"
upstream_protocol = "https"
