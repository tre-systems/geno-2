name = "geno-2"
compatibility_date = "2024-08-06"
compatibility_flags = ["nodejs_compat"]
main = "worker.js"

[assets]
directory = "./dist"
binding = "ASSETS"
html_handling = "auto-trailing-slash"
not_found_handling = "single-page-application"
# Only the disabled-by-default legacy relay needs Worker code. Static app and
# control-panel assets are served directly by Cloudflare Assets.
run_worker_first = ["/room/*"]

[vars]
ENVIRONMENT = "production"
# Keep the legacy WebSocket/Durable Object relay closed in production. Set this
# to "true" only for a deliberate relay experiment with RELAY_KEY configured.
RELAY_ENABLED = "false"

[[routes]]
pattern = "geno-2.tre.systems/*"
zone_name = "tre.systems"

# Legacy performance relay. The Worker only routes /room/* to this binding when
# RELAY_ENABLED="true"; the current control-panel flow does not need it.
[[durable_objects.bindings]]
name = "ROOM"
class_name = "Room"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["Room"]

[dev]
port = 8787
local_protocol = "http"
upstream_protocol = "https"
