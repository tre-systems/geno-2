name: Architecture diagrams

on:
  pull_request:
    paths:
      - 'docs/diagrams/**'
      - 'scripts/check-diagrams.mjs'
      - 'package.json'
  push:
    branches:
      - main
    paths:
      - 'docs/diagrams/**'
      - 'scripts/check-diagrams.mjs'
      - 'package.json'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  diagrams:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Graphviz
        run: |
          sudo apt-get update
          sudo apt-get install -y graphviz

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Check diagram renders
        run: npm run check:diagrams
